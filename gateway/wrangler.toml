name = "one-gateway"
main = "src/index.ts"
workers_dev = true
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
VERSION = "1.0.0"
TYPEDB_URL = "https://flsiu1-0.cluster.typedb.com:1729"
TYPEDB_DATABASE = "one"

# Secrets (set with: wrangler secret put)
# TYPEDB_USERNAME - "admin"
# TYPEDB_PASSWORD - TypeDB Cloud password
# Set via Cloudflare Dashboard: Workers > one-gateway > Settings > Environment Variables

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "one"
database_id = "0aa5fceb-667a-470e-b08c-40ead2f4525d"

# KV Namespace
[[kv_namespaces]]
binding = "KV"
id = "1c1dac4766e54a2c85425022a3b1e9da"

# Durable Object: WsHub centralizes WebSocket connections across isolates
[[durable_objects.bindings]]
name = "WS_HUB"
class_name = "WsHub"

# Migration: new_sqlite_classes for WsHub (required on first deploy)
[[migrations]]
tag = "v1"
new_sqlite_classes = ["WsHub"]

# Custom domain
[[routes]]
pattern = "api.one.ie"
custom_domain = true
