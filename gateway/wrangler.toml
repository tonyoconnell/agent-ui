name = "one-gateway"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
VERSION = "1.0.0"

# Secrets (set with: wrangler secret put TYPEDB_URL)
# TYPEDB_URL      - TypeDB Cloud HTTP endpoint
# TYPEDB_DATABASE - Database name ("one")
# TYPEDB_USERNAME - "admin"
# TYPEDB_PASSWORD - TypeDB Cloud password

# Custom domain
# [[routes]]
# pattern = "api.one.ie"
# custom_domain = true
