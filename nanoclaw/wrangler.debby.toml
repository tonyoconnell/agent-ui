# debby-claw — NanoClaw instance for debby
# Generated by scripts/setup-nanoclaw.ts
# Deploy: cd nanoclaw && npx wrangler deploy --config wrangler.debby.toml

name = "debby-claw"
main = "src/workers/router.ts"
workers_dev = true
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
VERSION = "1.0.0"
GATEWAY_URL = "https://one-gateway.oneie.workers.dev"
BOT_PERSONA = "debby"

[[d1_databases]]
binding = "DB"
database_name = "one"
database_id = "0aa5fceb-667a-470e-b08c-40ead2f4525d"

[[kv_namespaces]]
binding = "KV"
id = "1c1dac4766e54a2c85425022a3b1e9da"

[[queues.producers]]
binding = "AGENT_QUEUE"
queue = "debby-agents"

[[queues.consumers]]
queue = "debby-agents"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3

# Secrets (set via setup-nanoclaw.ts or: wrangler secret put --config wrangler.debby.toml)
# OPENROUTER_API_KEY
# API_KEY
# TELEGRAM_TOKEN   (optional — wire after getting token from BotFather)
