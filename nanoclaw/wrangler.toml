# NanoClaw — Edge-native agents on Cloudflare free tier
name = "nanoclaw"
main = "src/workers/router.ts"
workers_dev = true
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
VERSION = "1.0.0"
GATEWAY_URL = "https://one-gateway.oneie.workers.dev"

# D1 Database (same as gateway)
[[d1_databases]]
binding = "DB"
database_name = "one"
database_id = "0aa5fceb-667a-470e-b08c-40ead2f4525d"

# KV Namespace (same as gateway)
[[kv_namespaces]]
binding = "KV"
id = "1c1dac4766e54a2c85425022a3b1e9da"

# KV — auth rate limiting (IP + email composite limits per src/lib/auth-rate-limit.ts)
# Provision: wrangler kv:namespace create one-auth-rate-limit
# Then replace PROVISION_NEEDED with the returned namespace ID.
[[kv_namespaces]]
binding = "AUTH_RATE_LIMIT"
id = "PROVISION_NEEDED"

# Queue for agent processing
[[queues.producers]]
binding = "AGENT_QUEUE"
queue = "nanoclaw-agents"

[[queues.consumers]]
queue = "nanoclaw-agents"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3

# Cron for scheduled tasks
[triggers]
crons = ["* * * * *"]

# Secrets (set with: wrangler secret put)
# OPENROUTER_API_KEY
# TELEGRAM_TOKEN          — your bot token (get from @BotFather, webhook: /webhook/telegram)
# TELEGRAM_TOKEN_ONE      — ONE assistant bot @onedotbot (webhook: /webhook/telegram-one)
# TELEGRAM_TOKEN_<NAME>   — add your own bot (webhook: /webhook/telegram-<name>)
# DISCORD_TOKEN
#
# Agent identity — Gap 1 owner architecture (docs/agent-boot-unlock.md)
# Provision AFTER running: POST /api/agents/register on one.ie (owner bearer required).
# The register call returns bearer + address once; copy the bearer into AGENT_BEARER.
# AGENT_UID           — agent uid string, e.g. "marketing:scout"
# AGENT_BEARER        — bearer returned by POST /api/agents/register (shown once)
# UNLOCK_SIGNING_KEY  — base64url HMAC key; operator generates with:
#                         openssl rand -base64 32 | tr '+/' '-_' | tr -d '='
#                       Same value must be set as UNLOCK_SIGNING_KEY on one.ie.
# ONE_HOST            — optional; defaults to https://one.ie
#                       Override for staging: wrangler secret put ONE_HOST (value: https://dev.one.ie)
