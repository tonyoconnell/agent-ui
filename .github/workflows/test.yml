name: Test

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun biome check .

      - name: Typecheck
        run: bash scripts/typecheck.sh

      - name: Test (Vitest)
        run: bun vitest run --coverage

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            .vitest/results.json
            coverage/
          retention-days: 7
