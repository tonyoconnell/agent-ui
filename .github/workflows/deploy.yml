name: Deploy

on:
  push:
    branches: [main, 'feature/**']
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # One code path. Local `bun run deploy` and CI run the SAME script.
  # The GitHub `environment: production` gate is the only human checkpoint
  # for main — after reviewer approval, DEPLOY_CONFIRM=yes bypasses the TTY
  # prompt and the single script handles W0 → build → deploy → health.
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Astro 6 requires Node >= 22.12. Bun alone doesn't set Node version,
      # and `astro build` shells out to Node. Pin from .nvmrc.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Deploy (W0 → build → parallel workers + pages → health)
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_GLOBAL_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Scoped tokens lack worker+domain permissions. Force Global Key.
          CLOUDFLARE_API_TOKEN: ''
          # Human approval already happened via the production environment gate.
          DEPLOY_CONFIRM: 'yes'
        run: bun run deploy
