# ONE Platform - Web Foundation Package
# Build with: npx oneie admin build web

name: "@oneie/web"
description: "ONE Platform foundation - Astro + React + Tailwind starter"
version: "1.0.0"
type: foundation
price: free

github:
  app: one-ie/web

npm:
  access: public

# Files to include (relative to monorepo root)
include:
  # ========== ROOT FILES ==========
  - web/astro.config.mjs
  - web/tsconfig.json
  - web/package.json
  - web/wrangler.toml
  - web/.gitignore
  - web/.npmrc
  - web/.env.example
  - web/README.md
  - web/LICENSE.md
  - web/CLAUDE.md

  # ========== PAGES (Core) ==========
  - web/src/pages/index.astro
  - web/src/pages/404.astro
  - web/src/pages/CLAUDE.md

  # ========== LAYOUTS ==========
  - web/src/layouts/Layout.astro
  - web/src/layouts/LandingLayout.astro
  - web/src/layouts/AppLayout.astro
  - web/src/layouts/TextLayout.astro

  # ========== COMPONENTS - UI (shadcn) ==========
  - web/src/components/ui/**

  # ========== COMPONENTS - Landing ==========
  - web/src/components/landing/**

  # ========== COMPONENTS - Core ==========
  - web/src/components/Sidebar.tsx
  - web/src/components/ModeToggle.tsx
  - web/src/components/FaqAccordion.tsx
  - web/src/components/Chart.tsx
  - web/src/components/CopyButton.tsx
  - web/src/components/ErrorBoundary.tsx
  - web/src/components/ThemeInit.astro
  - web/src/components/ThemeProvider.tsx
  - web/src/components/TransitionController.tsx
  - web/src/components/CLAUDE.md

  # ========== COMPONENTS - Charts ==========
  - web/src/components/charts/**

  # ========== COMPONENTS - Ontology UI (core only) ==========
  # Include core ontology components, exclude feature-specific ones
  - web/src/components/ontology-ui/core/**
  - web/src/components/ontology-ui/things/**
  - web/src/components/ontology-ui/connections/**
  - web/src/components/ontology-ui/events/**
  - web/src/components/ontology-ui/knowledge/**
  - web/src/components/ontology-ui/people/**
  - web/src/components/ontology-ui/groups/**

  # ========== LIB - Utilities ==========
  - web/src/lib/utils.ts
  - web/src/lib/date.ts
  - web/src/lib/CLAUDE.md

  # ========== STYLES ==========
  - web/src/styles/global.css
  - web/src/styles/transitions.css
  - web/src/styles/landing-theme.css

  # ========== CONFIG ==========
  - web/src/config/site.ts
  - web/src/config/providers.ts
  - web/src/config/backend.ts
  - web/src/config/validation.ts

  # ========== HOOKS (Core) ==========
  - web/src/hooks/index.ts
  - web/src/hooks/types.ts
  - web/src/hooks/use-mobile.tsx
  - web/src/hooks/use-mobile.ts
  - web/src/hooks/use-media-query.ts
  - web/src/hooks/use-toast.ts

  # ========== STORES ==========
  - web/src/stores/**

  # ========== TYPES ==========
  - web/src/types/**

  # ========== PUBLIC ASSETS ==========
  - web/public/favicon.svg
  - web/public/icon.svg
  - web/public/logo.svg
  - web/public/og.jpg
  - web/public/robots.txt

  # ========== ENV & TYPES ==========
  - web/src/env.d.ts

# Files to exclude
exclude:
  # Feature packages (separate)
  - web/src/pages/shop/**
  - web/src/pages/blog/**
  - web/src/pages/docs/**
  - web/src/pages/dashboard/**
  - web/src/pages/chat/**
  - web/src/pages/account/**
  - web/src/pages/api/**
  - web/src/pages/checkout/**
  # One-off marketing pages
  - web/src/pages/ai.astro
  - web/src/pages/deploy.astro
  - web/src/pages/design.astro
  - web/src/pages/creators.astro
  - web/src/pages/cli.astro
  # Feature-specific components
  - web/src/components/ai/**
  - web/src/components/auth/**
  - web/src/components/course/**
  - web/src/components/dashboard/**
  - web/src/components/ecommerce/**
  - web/src/components/docs/**
  # Feature-specific ontology-ui (crypto, streaming, enhanced, visualization)
  - web/src/components/ontology-ui/crypto/**
  - web/src/components/ontology-ui/streaming/**
  - web/src/components/ontology-ui/enhanced/**
  - web/src/components/ontology-ui/visualization/**

# Dependencies to install
# Sync from web/package.json as the source of truth
dependencies:
  # Core Astro
  astro: "^5.0.0"
  "@astrojs/cloudflare": "^12.0.0"
  "@astrojs/node": "^9.0.0"
  "@astrojs/react": "^4.0.0"
  "@astrojs/mdx": "^4.0.0"
  "@astrojs/sitemap": "^3.0.0"
  "@astrojs/check": "^0.9.0"

  # React
  react: "^19.0.0"
  react-dom: "^19.0.0"
  "@types/react": "^19.0.0"
  "@types/react-dom": "^19.0.0"

  # Tailwind
  tailwindcss: "^4.0.0"
  "@tailwindcss/vite": "^4.0.0"
  "@tailwindcss/typography": "0.5.0-alpha.3"
  tw-animate-css: "^1.4.0"

  # State management
  nanostores: "^1.0.0"
  "@nanostores/react": "^1.0.0"

  # UI utilities
  class-variance-authority: "^0.7.0"
  clsx: "^2.1.0"
  tailwind-merge: "^3.0.0"
  lucide-react: "^0.546.0"
  lucide-astro: "^0.547.0"

  # Radix UI primitives (complete set)
  "@radix-ui/react-accordion": "^1.2.0"
  "@radix-ui/react-alert-dialog": "^1.1.0"
  "@radix-ui/react-aspect-ratio": "^1.1.0"
  "@radix-ui/react-avatar": "^1.1.0"
  "@radix-ui/react-checkbox": "^1.3.0"
  "@radix-ui/react-collapsible": "^1.1.0"
  "@radix-ui/react-context-menu": "^2.2.0"
  "@radix-ui/react-dialog": "^1.1.0"
  "@radix-ui/react-dropdown-menu": "^2.1.0"
  "@radix-ui/react-hover-card": "^1.1.0"
  "@radix-ui/react-label": "^2.1.0"
  "@radix-ui/react-menubar": "^1.1.0"
  "@radix-ui/react-navigation-menu": "^1.2.0"
  "@radix-ui/react-popover": "^1.1.0"
  "@radix-ui/react-progress": "^1.1.0"
  "@radix-ui/react-radio-group": "^1.3.0"
  "@radix-ui/react-scroll-area": "^1.2.0"
  "@radix-ui/react-select": "^2.1.0"
  "@radix-ui/react-separator": "^1.1.0"
  "@radix-ui/react-slider": "^1.2.0"
  "@radix-ui/react-slot": "^1.1.0"
  "@radix-ui/react-switch": "^1.1.0"
  "@radix-ui/react-tabs": "^1.1.0"
  "@radix-ui/react-toast": "^1.2.0"
  "@radix-ui/react-toggle": "^1.1.0"
  "@radix-ui/react-toggle-group": "^1.1.0"
  "@radix-ui/react-tooltip": "^1.1.0"

  # UI components
  sonner: "^2.0.0"
  cmdk: "^1.0.0"
  vaul: "^1.0.0"
  input-otp: "^1.4.0"
  react-day-picker: "^9.0.0"
  embla-carousel-react: "^8.0.0"
  embla-carousel-autoplay: "^8.0.0"
  react-resizable-panels: "^3.0.0"
  react-hook-form: "^7.0.0"
  "@hookform/resolvers": "^5.0.0"

  # Data & Charts
  recharts: "^2.15.0"
  date-fns: "^4.0.0"
  "@tanstack/react-table": "^8.0.0"

  # Animation
  framer-motion: "^12.0.0"
  motion: "^12.0.0"

  # DnD
  "@dnd-kit/core": "^6.0.0"
  "@dnd-kit/sortable": "^10.0.0"
  "@dnd-kit/utilities": "^3.0.0"

  # Visualization
  "@xyflow/react": "^12.0.0"

  # Other utilities
  marked: "^16.0.0"
  lodash-es: "^4.17.0"
  zod: "^4.0.0"
  nanoid: "^5.0.0"

devDependencies:
  typescript: "^5.7.0"
  "@types/lodash-es": "^4.17.0"

env:
  optional:
    - PUBLIC_CONVEX_URL
    - CONVEX_DEPLOYMENT
