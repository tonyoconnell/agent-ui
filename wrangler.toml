# ONE Substrate — Cloudflare Worker with Static Assets
# (Migrated from Pages — see docs/TODO-cf-workers-migration.md)
#
# @astrojs/cloudflare v13 auto-injects `main` + `[assets]` during build.
# Declaring them here causes CF's vite plugin to validate file existence
# at config-resolve time (before build), which fails on fresh checkouts.
# Trust the adapter; keep this file scoped to deploy-level concerns only.
name = "one-substrate"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# D1 — vault passkey hints (cred_id → pub_key, sign_count for WebAuthn verification)
[[d1_databases]]
binding = "DB"
database_name = "one-vault"
database_id = "3fc6052a-8b50-4db4-89dc-b32f86ee5dbf"

# KV — shared with sync worker (same namespace ID)
# Snapshots: paths.json, units.json, skills.json, highways.json, toxic.json
[[kv_namespaces]]
binding = "KV"
id = "1c1dac4766e54a2c85425022a3b1e9da"

# KV — auth rate limiting (IP + email composite limits per src/lib/auth-rate-limit.ts)
# Provision: wrangler kv:namespace create one-auth-rate-limit
# Then replace PROVISION_NEEDED with the returned namespace ID.
[[kv_namespaces]]
binding = "AUTH_RATE_LIMIT"
id = "1c63b2a515004af19dab84a7939761d0"

# Astro 6 + @astrojs/cloudflare v13 auto-binds a "SESSION" KV namespace if one
# exists. We omit it for now — sessions fall back to in-memory in dev (lost on
# isolate restart, fine) and need a dedicated prod namespace before being wired.
# Provision: `wrangler kv:namespace create one-sessions` then add a [[kv_namespaces]]
# block here with binding="SESSION". DO NOT share the id with the snapshot KV.

# Cron triggers
# "0 * * * *" = every hour on the hour → wallet reconciliation tick
# Add to wrangler.toml and register the route in your Worker's fetch handler,
# or call POST /api/reconcile directly from the cron handler.
# See: https://developers.cloudflare.com/workers/platform/triggers/cron-triggers/
# Uncomment the block below to activate (requires a paid Workers plan for cron):
#
# [triggers]
# crons = ["0 * * * *"]
#
# Then in the Worker entry point (dist/_worker.js) add a `scheduled` handler:
#   async scheduled(event, env, ctx) {
#     ctx.waitUntil(fetch(new Request("https://one.ie/api/reconcile", { method: "POST" })))
#   }

# R2 backup bucket — used by workers/backup (one-typedb-backup worker)
# Bucket: one-typedb-backups (provision via: wrangler r2 bucket create one-typedb-backups)
# Backup worker wrangler.toml: workers/backup/wrangler.toml
# Restore script: scripts/restore-typedb.ts

# Worker environment configuration
[vars]
PUBLIC_SITE_URL = "https://dev.one.ie"

[env.production]
vars = { ENVIRONMENT = "production", PUBLIC_SITE_URL = "https://dev.one.ie" }
