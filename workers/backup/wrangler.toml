name = "one-typedb-backup"
main = "index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Daily at 02:00 UTC
[triggers]
crons = ["0 2 * * *"]

[[kv_namespaces]]
binding = "KV"
id = "1c1dac4766e54a2c85425022a3b1e9da"

[[r2_buckets]]
binding = "BACKUP"
bucket_name = "one-typedb-backups"
