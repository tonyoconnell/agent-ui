name = "one-sync"
main = "index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Sync every minute (hash-based change detection keeps KV writes minimal)
[triggers]
crons = ["* * * * *"]

[[kv_namespaces]]
binding = "KV"
id = "1c1dac4766e54a2c85425022a3b1e9da"

[vars]
APP_URL = "https://one.ie"
